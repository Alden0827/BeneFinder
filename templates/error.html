<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.APP_NAME }} - Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-lg shadow-xl p-8 text-center">
        <div class="text-red-500 text-6xl mb-4">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Connection or System Error</h1>
        <p class="text-gray-600 mb-6">
            An error occurred while processing your request or the host <span class="font-mono bg-gray-100 px-1 rounded text-red-600">172.31.196.14</span> is unreachable.
        </p>
        
        {% if error %}
        <div class="bg-gray-50 p-4 rounded text-left text-xs font-mono text-gray-500 mb-6 overflow-auto max-h-40">
            {{ error }}
        </div>
        {% endif %}

        <div class="bg-blue-50 p-4 rounded-lg border border-blue-100 mb-6">
            <p class="text-sm text-blue-800 font-semibold mb-1">Please contact the developer:</p>
            <a href="mailto:{{ config.DEV_CONTACT }}" class="text-blue-600 hover:underline font-bold">
                {{ config.DEV_CONTACT }}
            </a>
        </div>
        
        <a href="{{ url_for('finder.index') }}" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition">
            Try again
        </a>
    </div>
</body>
</html>
